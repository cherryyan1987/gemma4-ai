<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemma 4 AI</title>
  <meta name="description" content="Gemma 4 AI - Open-source AI playground with upcoming image and video generation tools." />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef6ff 0%, #f9fbff 100%);
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 860px;
      background: #ffffff;
      border-radius: 24px;
      padding: 56px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      text-align: center;
      border: 1px solid #dbeafe;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 56px;
      line-height: 1.05;
    }

    p {
      margin: 0 auto 18px;
      max-width: 680px;
      font-size: 20px;
      line-height: 1.7;
      color: #4b5563;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 28px 0 40px;
    }

    .tag {
      padding: 10px 16px;
      border-radius: 999px;
      background: #f8fafc;
      border: 1px solid #dbeafe;
      color: #1f2937;
      font-size: 15px;
      font-weight: 600;
    }

    .cta {
      display: inline-block;
      padding: 22px 42px;
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
      text-decoration: none;
      border-radius: 18px;
      background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
      box-shadow: 0 16px 32px rgba(37, 99, 235, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 36px rgba(37, 99, 235, 0.34);
    }

    .footer {
      margin-top: 26px;
      font-size: 14px;
      color: #6b7280;
    }

    @media (max-width: 640px) {
      .card {
        padding: 40px 24px;
      }

      h1 {
        font-size: 38px;
      }

      p {
        font-size: 17px;
      }

      .cta {
        width: 100%;
        font-size: 22px;
        padding: 20px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Open-source AI Platform</div>
    <h1>Gemma 4 AI</h1>
    <p>
      Run AI models online, explore developer workflows, and discover upcoming
      AI image and video generation tools in one platform.
    </p>

    <div class="features">
      <span class="tag">AI Playground</span>
      <span class="tag">Image Generation</span>
      <span class="tag">Video Generation</span>
      <span class="tag">Free + Paid</span>
      <span class="tag">Developer Friendly</span>
    </div>

    <a class="cta" href="https://gemma4.site" target="_blank" rel="noopener noreferrer">
      Visit Gemma4.site
    </a>

    <div class="footer">
      Contact: connect@gemma4.site
    </div>
  </main>
</body>
</html>
